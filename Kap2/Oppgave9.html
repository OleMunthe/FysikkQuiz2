       max-height: 300px; /* Maks høyde */

<body>

<a href="../index.html">← Tilbake til hovedsiden</a>

<div class="status">
    <div class="progress-bar">
        <div class="progress" id="progress"></div>
    </div>
    <div class="teller">
        Riktig: <span id="riktig">0</span> |
        Feil: <span id="feil">0</span> |
        Score: <span id="prosent">0</span>%
    </div>
</div>







<div class="container">
    <div class="box">
        <p><strong>Hva sier det andre postulatet i den spesielle relativitetsteorien?</strong></p>

        <form id="quiz">
            <label class="svar">
                <input type="radio" name="svar" value="riktig">
                <span>Farten til et foton er den samme i alle treghetssystemer</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>Energien et foton er den samme i alle treghetssystemer</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>Bølgelengden et fotone er den samme i alle treghetssystemer</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>Frekvensen til et foton er den samme i alle treghetssystmer </span>
            </label>
        </form>

        <div id="resultat"></div>
        <button id="neste" onclick="nesteSporsmal()">Neste spørsmål</button>
    </div>

</div>


</body>
</html>
