<!DOCTYPE html>

       max-height: 300px; /* Maks høyde */

<body>

<a href="../index.html">← Tilbake til hovedsiden</a>

<div class="status">
    <div class="progress-bar">
        <div class="progress" id="progress"></div>
    </div>
    <div class="teller">
        Riktig: <span id="riktig">0</span> |
        Feil: <span id="feil">0</span> |
        Score: <span id="prosent">0</span>%
    </div>
</div>







<div class="container">
    <div class="box">
     
        <p><strong>Comptoneffekten er når</strong></p>

        <form id="quiz">
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>to fotoner kolliderer, og begge fotonene endrer retning og frekvens</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>to elektroner kolliderer, og det oppstår et foton</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>et elektron kolliderer med et metall, og det sendes ut stråling</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="riktig">
                <span>et foton kolliderer med et elektron, og noe av energien til fotonet overføres til elektronet</span>
            </label>
        </form>

        <div id="resultat"></div>
        <button id="neste" onclick="nesteSporsmal()">Neste spørsmål</button>
    </div>


</body>
</html>
