<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flervalgsoppgaver Fysikk 1</title>

<!-- MathJax -->
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<link rel="stylesheet" href="../FlervalgsStyle.css">

<script src="../FlervalgScript.js" defer></script>

<style>
img {
       max-height: 300px; /* Maks høyde */
    max-width: 300px; /* Maks bredde*/    
}
</style>
</head>



<body>

<a href="../index.html">← Tilbake til hovedsiden</a>

<div class="status">
    <div class="progress-bar">
        <div class="progress" id="progress"></div>
    </div>
    <div class="teller">
        Riktig: <span id="riktig">0</span> |
        Feil: <span id="feil">0</span> |
        Score: <span id="prosent">0</span>%
    </div>
</div>







<div class="container">
    <div class="box">
        <p>En kasse med masse 10 kg glir ned et skråplan.</p>
        <p>Se lengdemål i figuren og sett \(g\) = 10 m/s\(^2\).</p>
        <p><strong>Hvor stort arbeid gjør gravitasjonen på kassa fra toppen til bunnen av skråplanet?</strong></p>

        <form id="quiz">
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>1,2 kJ</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="riktig">
                <span>0,50 kJ</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>1,3 kJ</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>Svaret avhenger av om det virker friksjon og/eller luftmotstand.</span>
            </label>
        </form>

        <div id="resultat"></div>
        <button id="neste" onclick="nesteSporsmal()">Neste spørsmål</button>
    </div>

       <div class="box" style="display: grid; place-items: center;">
        <img src="gli.png" alt="Kasse glir ned skråplan" >
    </div>
</div>


</body>
</html>
