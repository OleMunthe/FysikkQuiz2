<div class="status">
    <div class="progress-bar">
        <div class="progress" id="progress"></div>
    </div>
    <div class="teller">
        Riktig: <span id="riktig">0</span> |
        Feil: <span id="feil">0</span> |
        Score: <span id="prosent">0</span>%
    </div>
</div>







<div class="container">
    <div class="box">
        <p>Et elektron akselereres fra ro over en avstand \(d\) i et homogent elektrisk felt med feltstyrke \(E\). </p>

        <p> Spenningen over platene er \(U\)</p>

        <p><strong>Hva er riktig uttrykk for farten elektronet har etter at det er akselerert?</strong></p>

        <form id="quiz">
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>\(\sqrt{\frac{2eUd}{m_{\text{e}}}}\)</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="riktig">
                <span>\(\sqrt{\frac{2eU}{m_{\text{e}}}}\)</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>\(\frac{2eUd}{m_{\text{e}}}\)</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>\(\frac{2eU}{m_{\text{e}}}\)</span>
            </label>
        </form>

        <div id="resultat"></div>
        <button id="neste" onclick="nesteSporsmal()">Neste spørsmål</button>
    </div>

   <div class="box" style="display: grid; place-items: center;">
        <img src="eaks.jpeg" alt=" " >
    </div>
