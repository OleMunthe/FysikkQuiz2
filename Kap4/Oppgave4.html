<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flervalgsoppgaver Fysikk 1</title>

<!-- MathJax -->
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<link rel="stylesheet" href="../FlervalgsStyle.css">

<script src="../FlervalgScript.js" defer></script>

<style>
img {
       max-height: 300px; /* Maks høyde */
    max-width: 400px; /* Maks bredde*/    
}
</style>
</head>



<body>

<a href="../index.html">← Tilbake til hovedsiden</a>

<div class="status">
    <div class="progress-bar">
        <div class="progress" id="progress"></div>
    </div>
    <div class="teller">
        Riktig: <span id="riktig">0</span> |
        Feil: <span id="feil">0</span> |
        Score: <span id="prosent">0</span>%
    </div>
</div>







<div class="container">
    <div class="box">
        <p>En person med masse 100 kg dødser fra 5'metern.</p>
        <p>Sett \(g\) = 10 m/s\(^2\).</p>
        <p><strong>Hvor stort arbeid gjør summen av kreftene på personen de siste 2,0 meterne av fallet?</strong></p>

        <form id="quiz">
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>2,0 kJ</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>1,0 kN</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>1,0 kJ</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="riktig">
                <span>Svaret avhenger av om vi må ta hensyn til luftmotstand.</span>
            </label>
        </form>

        <div id="resultat"></div>
        <button id="neste" onclick="nesteSporsmal()">Neste spørsmål</button>
    </div>

       <div class="box" style="display: grid; place-items: center;">
        <img src="5ern.png" alt="En som dødser fra 5ern" >
    </div>
</div>


</body>
</html>
