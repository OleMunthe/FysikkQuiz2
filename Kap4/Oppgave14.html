<body>

<a href="../index.html">← Tilbake til hovedsiden</a>

<div class="status">
    <div class="progress-bar">
        <div class="progress" id="progress"></div>
    </div>
    <div class="teller">
        Riktig: <span id="riktig">0</span> |
        Feil: <span id="feil">0</span> |
        Score: <span id="prosent">0</span>%
    </div>
</div>







<div class="container">
    <div class="box">
        <p>En person bærer en koffert med masse 5,0 kg. Kraften fra hånda på kofferten er \(N\). Personen går med en konstant fart en strekning \(s = 3\) m. Arbeidet personen gjør på kofferten er \(W\).</p>
        
        <p>Sett \(g\) = 10 m/s\(^2\).</p>

        <p><strong>Hva er riktig?</strong></p>

        <form id="quiz">
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>\(N\) = 0 N og \(W\) = 0 J</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="riktig">
                <span>\(N\) = 50 N og \(W\) = 0 J</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>\(N\) = 50 N og \(W\) = 150 J</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>\(N\) = 0 N og \(W\) = 150 J</span>
            </label>
        </form>

        <div id="resultat"></div>
        <button id="neste" onclick="nesteSporsmal()">Neste spørsmål</button>
    </div>

       <div class="box" style="display: grid; place-items: center;">
        <img src="kofferthor.png" alt="En koffert som bæres" >
    </div>
</div>


</body>
