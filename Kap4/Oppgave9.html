<div class="status">
    <div class="progress-bar">
        <div class="progress" id="progress"></div>
    </div>
    <div class="teller">
        Riktig: <span id="riktig">0</span> |
        Feil: <span id="feil">0</span> |
        Score: <span id="prosent">0</span>%
    </div>
</div>







<div class="container">
    <div class="box">
        <p>En heliumkjerne sendes mot en større atomkjerne.</p>
        
        <p>Programmet finner tiden det tar for heliumkjernen å bevege seg fra en avstand \(r\) til en avstand \(d\) fra den større kjernen.</p>

        <p><strong>Hva skal stå på linje 13?</strong></p>

        <form id="quiz">
            <label class="svar">
                <input type="radio" name="svar" value="riktig">
                <span>a = k*Q*q/(r**2*m)</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>a = k*Q*q/(r*2*m)</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>a = -k*Q*q/(r**2*m)</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>a = -k*Q*q/(r*2*m)</span>
            </label>
        </form>

        <div id="resultat"></div>
        <button id="neste" onclick="nesteSporsmal()">Neste spørsmål</button>
    </div>

   <div class="box" style="display: grid; place-items: center;">
        <img src="kollisjonsprogram.png" alt=" " >
    </div>
</div>
