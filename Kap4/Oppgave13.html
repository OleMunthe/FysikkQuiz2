<body>

<a href="../index.html">← Tilbake til hovedsiden</a>

<div class="status">
    <div class="progress-bar">
        <div class="progress" id="progress"></div>
    </div>
    <div class="teller">
        Riktig: <span id="riktig">0</span> |
        Feil: <span id="feil">0</span> |
        Score: <span id="prosent">0</span>%
    </div>
</div>







<div class="container">
    <div class="box">
        <p>En mann dytter en kasse bortover et horisontalt underlag. Se størrelser i figuren. I løpet av de 8,0 meterne er farten til kassa konstant.</p>
        
        <p><strong>Hvor stort arbeid gjør summen av kreftene på kassa?</strong></p>

        <form id="quiz">
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>0,23 kJ</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>82 J</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>0,24 kJ</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="riktig">
                <span>0 J</span>
            </label>
        </form>

        <div id="resultat"></div>
        <button id="neste" onclick="nesteSporsmal()">Neste spørsmål</button>
    </div>

       <div class="box" style="display: grid; place-items: center;">
        <img src="DytteBoks.png" alt="En kasse som dyttes" >
    </div>
</div>


</body>
