<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flervalgsoppgaver Fysikk 1</title>

<!-- MathJax -->
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<link rel="stylesheet" href="../FlervalgsStyle.css">

<script src="../FlervalgScript.js" defer></script>

<style>
img {
       max-height: 300px; /* Maks høyde */
    max-width: 430px; /* Maks bredde*/    
}
</style>
</head>


<body>

<a href="../index.html">← Tilbake til hovedsiden</a>

<div class="status">
    <div class="progress-bar">
        <div class="progress" id="progress"></div>
    </div>
    <div class="teller">
        Riktig: <span id="riktig">0</span> |
        Feil: <span id="feil">0</span> |
        Score: <span id="prosent">0</span>%
    </div>
</div>







<div class="container">
    <div class="box">
        <p>En golfball blir slått med horisontal startfart \(v_0\) mot hullet i en golfbane.</p>
        
        <P>La \(g\) = 10 m/s\(^2\) og se bort fra luftmotstand.</p>

        <p><strong>Hva må startfarten \(v_0\) være for at ballen skal treffe direkte i hullet?</strong></p>

        <form id="quiz">
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>4,0 m/s</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>5,0 m/s</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>10 m/s</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="riktig">
                <span>20 m/s</span>
            </label>
        </form>

        <div id="resultat"></div>
        <button id="neste" onclick="nesteSporsmal()">Neste spørsmål</button>
    </div>

   <div class="box" style="display: grid; place-items: center;">
        <img src="golf.jpeg"" alt=" " >
    </div>
</div>


</body>
</html>
