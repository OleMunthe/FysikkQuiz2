<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flervalgsoppgaver Fysikk 1</title>

<!-- MathJax -->
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<link rel="stylesheet" href="../FlervalgsStyle.css">

<script src="../FlervalgScript.js" defer></script>

<style>
img {
       max-height: 300px; /* Maks høyde */
    max-width: 300px; /* Maks bredde*/    
}
</style>
</head>


<body>

<a href="../index.html">← Tilbake til hovedsiden</a>

<div class="status">
    <div class="progress-bar">
        <div class="progress" id="progress"></div>
    </div>
    <div class="teller">
        Riktig: <span id="riktig">0</span> |
        Feil: <span id="feil">0</span> |
        Score: <span id="prosent">0</span>%
    </div>
</div>







<div class="container">
    <div class="box">
        <p>En kloss glir nedover et skråplan med helningsvinkel \(\alpha\).</p>
        
        <p>Friksjonstallet mellom klossen og skråplanet er 0,20. Se bort fra luftmotstand.</p>

        <p><strong>Hvor stor er akselerasjonen til klossen når den glir nedover skråplanet?</strong></p>

        <form id="quiz">
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>\( g \sin \alpha \)</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="riktig">
                <span>\( g \left( \sin \alpha - 0,20 \cos \alpha \right) \)</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>\(g \left( \sin \alpha + 0,20 \cos \alpha \right)\)</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>\(g \left( \cos \alpha + 0,20 \sin \alpha \right)\)</span>
            </label>
        </form>

        <div id="resultat"></div>
        <button id="neste" onclick="nesteSporsmal()">Neste spørsmål</button>
    </div>

   <div class="box" style="display: grid; place-items: center;">
        <img src="skråkloss.jpeg" alt=" " >
    </div>
</div>


</body>
</html>
