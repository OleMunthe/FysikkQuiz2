<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flervalgsoppgaver Fysikk 1</title>

<!-- MathJax -->
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<link rel="stylesheet" href="../FlervalgsStyle.css">

<script src="../FlervalgScript.js" defer></script>

<style>
img {
       max-height: 300px; /* Maks høyde */
    max-width: 500px; /* Maks bredde*/    
}
</style>
</head>


<body>

<a href="../index.html">← Tilbake til hovedsiden</a>

<div class="status">
    <div class="progress-bar">
        <div class="progress" id="progress"></div>
    </div>
    <div class="teller">
        Riktig: <span id="riktig">0</span> |
        Feil: <span id="feil">0</span> |
        Score: <span id="prosent">0</span>%
    </div>
</div>







<div class="container">
    <div class="box">
        <p>Figurene viser et lodd som henger i ro. Loddet er festet til to snorer, som igjen er festet til toppen
av to like høye stolper.</p>

<p>Det er gitt to påstander om snordragene:</p>

<ol>
  <li>\( S_1 > S_2 \)</li>
  <li>\( S_3 > S_4 \)</li>
</ol>

        <p><strong>Hva er riktig?</strong></p>

        <form id="quiz">
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>ingen av påstandene</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>bare påstand 1</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="riktig">
                <span>bare påstand 2</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>begge påstandene</span>
            </label>
        </form>

        <div id="resultat"></div>
        <button id="neste" onclick="nesteSporsmal()">Neste spørsmål</button>
    </div>

   <div class="box" style="display: grid; place-items: center;">
        <img src="2lodd.png" alt=" " >
    </div>
</div>


</body>
</html>
