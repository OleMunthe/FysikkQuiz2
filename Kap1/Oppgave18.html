<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flervalgsoppgaver Fysikk 1</title>

<!-- MathJax -->
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<link rel="stylesheet" href="../FlervalgsStyle.css">

<script src="../FlervalgScript.js" defer></script>

<style>
img {
       max-height: 300px; /* Maks høyde */
    max-width: 300px; /* Maks bredde*/    
}
</style>
</head>


<body>

<a href="../index.html">← Tilbake til hovedsiden</a>

<div class="status">
    <div class="progress-bar">
        <div class="progress" id="progress"></div>
    </div>
    <div class="teller">
        Riktig: <span id="riktig">0</span> |
        Feil: <span id="feil">0</span> |
        Score: <span id="prosent">0</span>%
    </div>
</div>







<div class="container">
    <div class="box">
        <p>En kloss med masse \(m\) slippes fra ro fra kanten av en vertikal halvsirkel med radius \(r\).</p>
        
        <p>Se bort fra all friksjon og luftmotstand.</p>
        
        <p><strong>Hvor stor er normalkraften på klossen i det laveste punktet i halvsirkelen?</strong></p>

        <form id="quiz">
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>\(mg\)</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>\(\sqrt{2} mg\)</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="riktig">
                <span>\(2mg\)</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>\(3mg\)</span>
            </label>
        </form>

        <div id="resultat"></div>
        <button id="neste" onclick="nesteSporsmal()">Neste spørsmål</button>
    </div>

   <div class="box" style="display: grid; place-items: center;">
        <img src="halfpipe.jpeg"" alt=" " >
    </div>
</div>


</body>
</html>
