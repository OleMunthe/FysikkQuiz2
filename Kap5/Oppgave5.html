<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flervalgsoppgaver Fysikk 1</title>

<!-- MathJax -->
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<link rel="stylesheet" href="../FlervalgsStyle.css">

<script src="../FlervalgScript.js" defer></script>

<style>
img {
       max-height: 300px; /* Maks høyde */
    max-width: 300px; /* Maks bredde*/    
}
</style>
</head>


<body>

<a href="../index.html">← Tilbake til hovedsiden</a>

<div class="status">
    <div class="progress-bar">
        <div class="progress" id="progress"></div>
    </div>
    <div class="teller">
        Riktig: <span id="riktig">0</span> |
        Feil: <span id="feil">0</span> |
        Score: <span id="prosent">0</span>%
    </div>
</div>







<div class="container">
    <div class="box">
        <p>Et elektron beveger seg mot høyre inn i et område der det er et homogent magnetfelt.</p>
        
        <p>Elektronetblir avbøyd i papirplanet slik figuren nedenfor viser. </p>

        <p><strong>Hva er riktig retning for det magnetiske feltet?</strong></p>

        <form id="quiz">
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>oppover</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>nedover</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="riktig">
                <span>ut av papirplanet</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>inn i papirplanet</span>
            </label>
        </form>

        <div id="resultat"></div>
        <button id="neste" onclick="nesteSporsmal()">Neste spørsmål</button>
    </div>

   <div class="box" style="display: grid; place-items: center;">
        <img src="Bbøy.jpeg" alt=" " >
    </div>
</div>


</body>
</html>
