<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flervalgsoppgaver Fysikk 1</title>

<!-- MathJax -->
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<link rel="stylesheet" href="../FlervalgsStyle.css">

<script src="../FlervalgScript.js" defer></script>

<style>
img {
       max-height: 300px; /* Maks høyde */
    max-width: 450px; /* Maks bredde*/    
}
</style>
</head>



<body>

<a href="../index.html">← Tilbake til hovedsiden</a>

<div class="status">
    <div class="progress-bar">
        <div class="progress" id="progress"></div>
    </div>
    <div class="teller">
        Riktig: <span id="riktig">0</span> |
        Feil: <span id="feil">0</span> |
        Score: <span id="prosent">0</span>%
    </div>
</div>







<div class="container">
    <div class="box">
        <p>To bokser ligger i ro, nesten inntil hverandre, på et glatt, horisontalt underlag.</p>
        <p>Mellom klossene settes det inn en spent fjær. Når fjæra slippes, skyver den klossen bort fra hverandre.</p>

        <p><strong>Hvor stor fart får den store boksen?</strong></p>

        <form id="quiz">
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>3,0 m/s</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="riktig">
                <span>1,5 m/s</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>6,0 m/s</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>2,1 m/s</span>
            </label>
        </form>

        <div id="resultat"></div>
        <button id="neste" onclick="nesteSporsmal()">Neste spørsmål</button>
    </div>

       <div class="box" style="display: grid; place-items: center;">
        <img src="BoksSpring.png" alt="To bokser som dyttes fra hverandre" >
    </div>
</div>


</body>
</html>
