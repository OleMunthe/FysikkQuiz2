<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flervalgsoppgaver Fysikk 1</title>

<!-- MathJax -->
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<link rel="stylesheet" href="../FlervalgsStyle.css">

<script src="../FlervalgScript.js" defer></script>

<style>
img {
       max-height: 300px; /* Maks høyde */
    max-width: 400px; /* Maks bredde*/    
}
</style>
</head>


<body>

<a href="../index.html">← Tilbake til hovedsiden</a>

<div class="status">
    <div class="progress-bar">
        <div class="progress" id="progress"></div>
    </div>
    <div class="teller">
        Riktig: <span id="riktig">0</span> |
        Feil: <span id="feil">0</span> |
        Score: <span id="prosent">0</span>%
    </div>
</div>







<div class="container">
    <div class="box">
        <p>Per og Kari står i ro på et veldig glatt underlag, slik at vi kan se bort fra friksjon. Per har masse 100 kg og Kari har masse 50 kg.</p>
           <p>Kari dytter Per, slik at han får en fart 2,0 m/s mot venstre.</p>
        <p><strong>Hva riktig om farten Kari får?</strong></p>

        <form id="quiz">
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>2,0 m/s mot høyre</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="riktig">
                <span>4,0 m/s mot høyre</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>1,0 m/s mot høyre</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>Hun blir stående i ro.</span>
            </label>
        </form>

        <div id="resultat"></div>
        <button id="neste" onclick="nesteSporsmal()">Neste spørsmål</button>
    </div>

       <div class="box" style="display: grid; place-items: center;">
        <img src="KariDytt2.png" alt="En person som dytter en annen" >
    </div>
</div>


</body>
</html>
