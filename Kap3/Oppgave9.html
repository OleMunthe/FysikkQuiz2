<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flervalgsoppgaver Fysikk 1</title>

<!-- MathJax -->
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<link rel="stylesheet" href="../FlervalgsStyle.css">

<script src="../FlervalgScript.js" defer></script>

<style>
img {
       max-height: 300px; /* Maks høyde */
    max-width: 250px; /* Maks bredde*/    
}
</style>
</head>





<body>

<a href="../index.html">← Tilbake til hovedsiden</a>

<div class="status">
    <div class="progress-bar">
        <div class="progress" id="progress"></div>
    </div>
    <div class="teller">
        Riktig: <span id="riktig">0</span> |
        Feil: <span id="feil">0</span> |
        Score: <span id="prosent">0</span>%
    </div>
</div>







<div class="container">
    <div class="box">
        <p>En kasse ligger på gulvet i en heis som akselerer.</p>
        <p>Gravitasjonskraften på kassa er 200 N.</p>
        <p>Normalkraften på kassa er 240 N.</p>
        <p>Bruk \(g\) = 10 m/s\(^2\).</p>
        <p><strong>Hvor stor masse har kassa?</strong></p>

        <form id="quiz">
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>24 kg</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="riktig">
                <span>20 kg</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>4,0 kg</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>44 kg</span>
            </label>
        </form>

        <div id="resultat"></div>
        <button id="neste" onclick="nesteSporsmal()">Neste spørsmål</button>
    </div>

       <div class="box" style="display: grid; place-items: center;">
        <img src="boksheis.png" alt="En person som slipper en stein" >
    </div>
</div>


</body>
</html>
