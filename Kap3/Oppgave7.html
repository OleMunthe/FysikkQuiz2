<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flervalgsoppgaver Fysikk 1</title>

<!-- MathJax -->
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<link rel="stylesheet" href="../FlervalgsStyle.css">

<script src="../FlervalgScript.js" defer></script>

<style>
img {
       max-height: 300px; /* Maks høyde */
    max-width: 550px; /* Maks bredde*/    
}
</style>
</head>





<body>

<a href="../index.html">← Tilbake til hovedsiden</a>

<div class="status">
    <div class="progress-bar">
        <div class="progress" id="progress"></div>
    </div>
    <div class="teller">
        Riktig: <span id="riktig">0</span> |
        Feil: <span id="feil">0</span> |
        Score: <span id="prosent">0</span>%
    </div>
</div>







<div class="container">
    <div class="box">
        <p>Per og Kari står i ro på et veldig glatt underlag, tilnærmet uten friksjon.</p>
        <p>Per har masse 100 kg og Kari har masse 50 kg.</p>
        <p>Kari dytter Per med en horisontal kraft på 50 N</p>
        <p><strong>Hvor stor akselerasjon for Per og Kari?</strong></p>

        <form id="quiz">
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>Begge får akselerasjonen 1,0 m/s\(^2\).</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="riktig">
                <span>Per får akselerasjonen 0,50 m/s\(^2\) og Kari 1,0 m/s\(^2\).</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>Per får akselerasjonen 1,0 m/s\(^2\) og Kari 0,50 m/s\(^2\).</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>Begge får akselerasjonen 0,50 m/s\(^2\).</span>
            </label>
        </form>

        <div id="resultat"></div>
        <button id="neste" onclick="nesteSporsmal()">Neste spørsmål</button>
    </div>

       <div class="box" style="display: grid; place-items: center;">
        <img src="KariDytt.png" alt="En person som slipper en stein" >
    </div>
</div>


</body>
</html>
