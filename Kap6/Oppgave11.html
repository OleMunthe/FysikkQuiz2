<body>

<div class="status">
    <div class="progress-bar">
        <div class="progress" id="progress"></div>
    </div>
    <div class="teller">
        Riktig: <span id="riktig">0</span> |
        Feil: <span id="feil">0</span> |
        Score: <span id="prosent">0</span>%
    </div>
</div>







<div class="container">
    <div class="box">
        <p>En U-formet elektrisk leder ligger horisontalt i et homogent magnetisk felt med retning inn i
papiret. Metallstaven dyttes i gang mot høyre og slippes.</p>

        <p><strong>Hvilken påstand er riktig etter at staven er sluppet?</strong></p>

        <form id="quiz">
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>Det induseres en strøm med klokka, og farten til staven vil avta.</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="riktig">
                <span>Det induseres en strøm mot klokka, og farten til staven vil avta.</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>Det induseres en strøm med klokka, og farten til staven vil øke.</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>Det induseres en strøm mot klokka, og farten til staven vil øke.</span>
            </label>
        </form>

        <div id="resultat"></div>
        <button id="neste" onclick="nesteSporsmal()">Neste spørsmål</button>
    </div>

   <div class="box" style="display: grid; place-items: center;">
        <img src="indstav.png" alt=" " >
    </div>
</div>


</body>
